<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Horror Komedi Prompt Engine V3</title>

<style>

body{
font-family:Arial;
background:#0b0b0b;
color:white;
margin:0;
padding:20px;
}

.container{
max-width:760px;
margin:auto;
}

h1{
text-align:center;
color:#ff4040;
}

.card{
background:#181818;
padding:15px;
border-radius:12px;
margin-bottom:20px;
}

label{
display:block;
margin-top:10px;
}

input,select{
width:100%;
padding:10px;
margin-top:5px;
border-radius:8px;
border:none;
background:#2a2a2a;
color:white;
}

button{
margin-top:12px;
padding:12px;
border:none;
border-radius:10px;
background:#ff4040;
color:white;
font-weight:bold;
width:100%;
}

.copyBtn{
background:#333;
}

.copyAll{
background:#008cff;
}

.output{
background:#111;
padding:12px;
border-radius:8px;
margin-top:10px;
white-space:pre-wrap;
}

.preview{
width:100%;
margin-top:10px;
border-radius:10px;
}

</style>
</head>

<body>

<div class="container">

<h1>HORROR KOMEDI PROMPT ENGINE V3</h1>

<div class="card">

<label>Upload Foto Referensi Vlogger</label>
<input type="file" id="photo">
<img id="preview" class="preview"/>

<label>Lokasi</label>
<input id="lokasi" placeholder="contoh: rumah kosong angker">

<label>Waktu</label>
<select id="waktu">
<option>malam hari berkabut</option>
<option>tengah malam sunyi</option>
<option>dini hari berkabut tipis</option>
<option>sore menjelang malam</option>
</select>

<label>Jenis Hantu</label>
<select id="hantu">

<option>pocong</option>
<option>kuntilanak</option>
<option>genderuwo</option>
<option>tuyul</option>
<option>wewe gombel</option>
<option>leak bali</option>
<option>sundel bolong</option>
<option>palasik</option>
<option>faceless ghost</option>
<option>winged monster</option>

</select>

<label>Jumlah Scene</label>
<input type="number" id="scene" value="4" min="3">

<label>Batch Prompt</label>
<input type="number" id="batch" value="1">

<button onclick="generate()">Generate Prompt</button>

</div>

<div id="result"></div>

</div>

<script>

const preview=document.getElementById("preview")

document.getElementById("photo").onchange=e=>{
preview.src=URL.createObjectURL(e.target.files[0])
}

function copyText(text){
navigator.clipboard.writeText(text)
alert("Prompt copied")
}

function random(arr){
return arr[Math.floor(Math.random()*arr.length)]
}

function camera(){

let cam=[

"shaky handheld smartphone camera",
"panic running handheld camera",
"violent amateur camera shake",
"uneven handheld framing",
"raw found footage camera movement",
"heavy breathing shaky camera"

]

return `camera: ${random(cam)}, no stabilizer, amateur vlog recording`

}

function weirdSound(){

let sounds=[

"distant whispering",
"dry leaves crunching nearby",
"metal object falling somewhere",
"low eerie humming",
"sudden branch snapping",
"wind blowing through empty corridor"

]

return random(sounds)

}

function comedy(){

let act=[

"throws stones at the ghost's head",

"hits the ghost repeatedly with a wooden stick",

"kicks the ghost angrily",

"hits the ghost using a sandal",

"throws random objects at the ghost",

"pulls the ghost's ear"

]

return random(act)

}

function buildSession(textA,textB,textC=""){
let s=`Session A (0-2s)
${textA}

Session B (2-4s)
${textB}

`
if(textC!=""){
s+=`Session C (4-6s)
${textC}`
}
return s
}

function generate(){

let lokasi=document.getElementById("lokasi").value
let waktu=document.getElementById("waktu").value
let hantu=document.getElementById("hantu").value
let scene=parseInt(document.getElementById("scene").value)
let batch=parseInt(document.getElementById("batch").value)

let result=document.getElementById("result")
result.innerHTML=""

let ghostScene=Math.floor(Math.random()*(scene-2))+2

for(let b=1;b<=batch;b++){

let html=`<div class="card"><h3>Batch ${b}</h3>`

let all=""

let img=

`HORROR IMAGE PROMPT

Seorang vlogger Indonesia sedang mengeksplor ${lokasi} pada ${waktu}.

Suasana lokasi terasa sunyi, gelap, dan menyeramkan.

Tidak ada hantu terlihat.

Ekspresi vlogger terlihat waspada dan sedikit gugup.

referensi karakter berdasarkan foto yang diupload.`

all+=img+"\n\n"

html+=`<b>Prompt Gambar</b>
<div class="output">${img}</div>
<button class="copyBtn" onclick='copyText(\`${img}\`)'>Copy</button>`

for(let i=1;i<=scene;i++){

let cam=camera()
let sound=weirdSound()

let text=""

if(i==1){

text=`VIDEO SCENE 1
Durasi: 6 detik
Lokasi: ${lokasi}
Waktu: ${waktu}

${buildSession(

`Vlogger berjalan perlahan sambil merekam sekitar. Ekspresi wajah penasaran namun tegang. Terdengar suara ${sound}. Kamera sedikit bergoyang.`,

`Vlogger menyorot area sekitar menggunakan kamera. Lingkungan terlihat gelap dan sepi. Suara angin dan ${sound} terdengar.`,

`Vlogger berhenti sejenak, mencoba mendengarkan suara sekitar dengan ekspresi curiga.`

)}

${cam}`

}

else if(i==ghostScene){

text=`VIDEO SCENE ${i} (GHOST APPEARANCE)
Durasi: 6 detik
Lokasi: ${lokasi}
Waktu: ${waktu}

${buildSession(

`Saat kamera menyorot ke depan, sosok ${hantu} terlihat samar di kejauhan. Vlogger terkejut dan menarik napas.`,

`Sosok ${hantu} mulai bergerak perlahan mendekat. Ekspresi vlogger berubah panik.`,

`Vlogger mundur perlahan sambil tetap merekam, suara ${sound} terdengar lebih jelas.`

)}

${cam}`

}

else if(i<scene){

text=`VIDEO SCENE ${i} (CHASE)
Durasi: 6 detik
Lokasi: ${lokasi}
Waktu: ${waktu}

${buildSession(

`${hantu} mulai mengejar vlogger. Vlogger berlari sambil memegang kamera.`,

`Kamera bergoyang hebat saat berlari. Nafas vlogger terdengar cepat.`,

`Suara langkah kaki dan ${sound} terdengar kacau di sekitar.`

)}

${cam}`

}

else{

text=`VIDEO SCENE ${i} (COMEDY CLIMAX)
Durasi: 6 detik
Lokasi: ${lokasi}
Waktu: ${waktu}

${buildSession(

`${hantu} hampir menangkap vlogger. Vlogger tiba-tiba berhenti dan terlihat kesal.`,

`Vlogger ${comedy()}. Ekspresi wajah marah namun lucu.`,

`Hantu terlihat ketakutan dan mencoba kabur sementara vlogger mengejar.`

)}

${cam}`

}

all+=text+"\n\n"

html+=`<b>Scene ${i}</b>
<div class="output">${text}</div>
<button class="copyBtn" onclick='copyText(\`${text}\`)'>Copy</button>`

}

html+=`<button class="copyAll" onclick='copyText(\`${all}\`)'>COPY SEMUA PROMPT</button>`

html+=`</div>`

result.innerHTML+=html

}

}

</script>

</body>
</html>
