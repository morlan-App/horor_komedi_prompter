<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Horror Komedi Prompt Engine V2</title>

<style>

body{
font-family:Arial;
background:#0b0b0b;
color:white;
margin:0;
padding:20px;
}

.container{
max-width:760px;
margin:auto;
}

h1{
text-align:center;
color:#ff4040;
}

.card{
background:#181818;
padding:15px;
border-radius:12px;
margin-bottom:20px;
}

label{
display:block;
margin-top:10px;
}

input,select{
width:100%;
padding:10px;
margin-top:5px;
border-radius:8px;
border:none;
background:#2a2a2a;
color:white;
}

button{
margin-top:12px;
padding:12px;
border:none;
border-radius:10px;
background:#ff4040;
color:white;
font-weight:bold;
width:100%;
}

.copyBtn{
background:#333;
}

.copyAll{
background:#008cff;
}

.output{
background:#111;
padding:12px;
border-radius:8px;
margin-top:10px;
white-space:pre-wrap;
}

.preview{
width:100%;
margin-top:10px;
border-radius:10px;
}

</style>
</head>

<body>

<div class="container">

<h1>HORROR KOMEDI PROMPT ENGINE V2</h1>

<div class="card">

<label>Upload Foto Referensi Vlogger</label>
<input type="file" id="photo">
<img id="preview" class="preview"/>

<label>Lokasi</label>
<input id="lokasi" placeholder="contoh: hutan angker">

<label>Waktu</label>
<select id="waktu">
<option>malam hari</option>
<option>tengah malam</option>
<option>dini hari berkabut</option>
</select>

<label>Jenis Hantu</label>
<select id="hantu">

<option>pocong</option>
<option>kuntilanak</option>
<option>genderuwo</option>
<option>tuyul</option>
<option>wewe gombel</option>
<option>leak bali</option>
<option>sundel bolong</option>
<option>palasik</option>
<option>faceless ghost</option>
<option>winged monster</option>

</select>

<label>Jumlah Scene</label>
<input type="number" id="scene" value="4" min="3">

<label>Horror Intensity</label>
<select id="intensity">

<option>low</option>
<option>medium</option>
<option>high</option>
<option>extreme</option>

</select>

<label>Batch Prompt</label>
<input type="number" id="batch" value="1">

<button onclick="generate()">Generate Prompt</button>

</div>

<div id="result"></div>

</div>

<script>

const preview=document.getElementById("preview")

document.getElementById("photo").onchange=e=>{
preview.src=URL.createObjectURL(e.target.files[0])
}

function copyText(text){

navigator.clipboard.writeText(text)
alert("Prompt copied")

}

function random(arr){

return arr[Math.floor(Math.random()*arr.length)]

}

function camera(){

let cam=[

"shaky handheld smartphone vlog camera",

"panic running handheld camera",

"violent amateur camera shake",

"sudden accidental camera pan",

"camera almost dropped while running",

"heavy breathing camera shake",

"uneven amateur framing",

"raw found footage recording",

"wild shaky vlog camera",

"chaotic handheld movement"

]

return `camera style:
${random(cam)}
no stabilizer
handheld amateur recording
raw vlog footage
NOT cinematic
NOT gimbal`

}

function comedy(){

let act=[

"throws stones at the ghost's head",

"hits the ghost repeatedly with a wooden stick",

"kicks the ghost angrily",

"chases the ghost aggressively",

"pulls the ghost's ear",

"hits the ghost with a sandal",

"throws random objects at the ghost"

]

return random(act)

}

function hashtags(){

return `

#horror
#hororkomedi
#povhorror
#ghost
#foundfootage
#vloghorror
#indonesianhorror
#scaryvideo
#urbanlegend

`

}

function generate(){

let lokasi=document.getElementById("lokasi").value
let waktu=document.getElementById("waktu").value
let hantu=document.getElementById("hantu").value
let scene=parseInt(document.getElementById("scene").value)
let intensity=document.getElementById("intensity").value
let batch=parseInt(document.getElementById("batch").value)

let result=document.getElementById("result")
result.innerHTML=""

for(let b=1;b<=batch;b++){

let cam=camera()

let html=`<div class="card"><h3>Batch ${b}</h3>`

let all=""

let img=

`HORROR IMAGE PROMPT

A nervous Indonesian vlogger exploring ${lokasi} at ${waktu}.

The vlogger slowly records the environment.

The location feels eerie and quiet.

No ghost visible.

${intensity} horror atmosphere.

reference character based on uploaded photo.

${cam}`

all+=img+"\n\n"

html+=`<b>Prompt Gambar</b>
<div class="output">${img}</div>
<button class="copyBtn" onclick='copyText(\`${img}\`)'>Copy</button>`

for(let i=1;i<=scene;i++){

let text=""

if(i==1){

text=`VIDEO SCENE 1 — EXPLORATION

The vlogger explores ${lokasi} at ${waktu}.

The environment feels tense.

Nothing unusual appears yet.

No ghost visible.

${cam}`

}

else if(i==2){

text=`VIDEO SCENE 2 — GHOST APPEARANCE

The ${hantu} appears in the distance.

The vlogger notices and becomes frightened.

${cam}`

}

else if(i<scene){

text=`VIDEO SCENE ${i} — CHASE

The ${hantu} chases the vlogger.

The vlogger runs while filming.

${intensity} horror intensity.

${cam}`

}

else{

text=`VIDEO SCENE ${i} — COMEDY CLIMAX

The ${hantu} gets very close.

The vlogger ${comedy()}.

The ghost becomes scared and runs away.

The vlogger chases the ghost.

Horror comedy chaotic ending.

${cam}`

}

all+=text+"\n\n"

html+=`<b>Scene ${i}</b>
<div class="output">${text}</div>
<button class="copyBtn" onclick='copyText(\`${text}\`)'>Copy</button>`

}

let tag=hashtags()

all+=tag

html+=`<b>Hashtags</b>
<div class="output">${tag}</div>
<button class="copyBtn" onclick='copyText(\`${tag}\`)'>Copy</button>`

html+=`<button class="copyAll" onclick='copyText(\`${all}\`)'>COPY SEMUA PROMPT</button>`

html+=`</div>`

result.innerHTML+=html

}

}

</script>

</body>
</html>
